substitutions:
  _TRAIN_IMAGE: europe-west1-docker.pkg.dev/nl-sql-peft-lab-ivan-0429/nl-to-sql-peft-lab/train:latest
  _RUNTIME_IMAGE: europe-west1-docker.pkg.dev/nl-sql-peft-lab-ivan-0429/nl-to-sql-peft-lab/runtime:latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -f
      - Dockerfile.train
      - --build-arg
      - RUNTIME_IMAGE=${_RUNTIME_IMAGE}
      - -t
      - ${_TRAIN_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_TRAIN_IMAGE}

images:
  - ${_TRAIN_IMAGE}

timeout: 1200s
