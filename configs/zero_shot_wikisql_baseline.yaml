experiment:
  name: zero-shot-wikisql-baseline
  seed: 42

dataset:
  name: Salesforce/wikisql
  split: validation
  eval_limit: 64

prompt:
  max_source_length: 384
  max_new_tokens: 96

models:
  - id: t5-small
    name: google-t5/t5-small
    architecture: seq2seq
    role: Pure T5 encoder-decoder
  - id: smollm2-135m-instruct
    name: HuggingFaceTB/SmolLM2-135M-Instruct
    architecture: causal
    role: Ultra-compact generalist decoder-only LLM
  - id: qwen2.5-coder-0.5b-instruct
    name: Qwen/Qwen2.5-Coder-0.5B-Instruct
    architecture: causal
    role: Code-specialized decoder-only LLM
  - id: gpt2
    name: openai-community/gpt2
    architecture: causal
    role: GPT-2 base decoder-only language model

generation:
  temperature: 0.0
  do_sample: false

output:
  path: outputs/baselines/zero_shot_wikisql.json
