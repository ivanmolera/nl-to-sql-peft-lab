experiment:
  name: t5-small-wikisql-qlora-full-train
  seed: 42

model:
  name: google-t5/t5-small

dataset:
  name: Salesforce/wikisql
  train_split: train
  eval_split: validation
  train_limit: null
  eval_limit: 256

prompt:
  max_source_length: 384
  max_target_length: 128

qlora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q
    - v

training:
  output_dir: outputs/t5-small-wikisql-qlora
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  num_train_epochs: 1
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  predict_with_generate: true
  generation_max_length: 128
