workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-8
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: europe-west1-docker.pkg.dev/nl-sql-peft-lab-ivan-0429/nl-to-sql-peft-lab/train:latest
      command:
        - python3
        - scripts/run_t5_ia3_pipeline.py
      env:
        - name: TRAIN_CONFIG
          value: configs/t5_small_wikisql_ia3_full.yaml
        - name: BENCHMARK_CONFIG
          value: configs/t5_small_wikisql_ia3_benchmark.yaml
        - name: GCS_OUTPUT_URI
          value: gs://nl-sql-peft-lab-ivan-0429-training/runs/t5-small-wikisql-ia3-full-train-v0.1.1
        - name: TRAINING_SERVICE
          value: Vertex AI Custom Job
        - name: TRAINING_REGION
          value: europe-west4
        - name: MACHINE_TYPE
          value: n1-standard-8
        - name: ACCELERATOR_TYPE
          value: NVIDIA_TESLA_T4
        - name: ACCELERATOR_COUNT
          value: "1"
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 100
