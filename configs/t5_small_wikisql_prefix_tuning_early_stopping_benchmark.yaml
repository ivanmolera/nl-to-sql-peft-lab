experiment:
  name: t5-small-wikisql-prefix-tuning-early-stopping-benchmark
  seed: 42

model:
  id: t5-small-prefix-tuning-v0-2
  name: google-t5/t5-small
  architecture: seq2seq
  role: T5-small fine-tuned with Prefix Tuning and early stopping
  adapter_path: outputs/v0.2/t5-small-wikisql-prefix-tuning-early-stopping/adapter

dataset:
  name: Salesforce/wikisql
  split: validation
  sample_size: 1000
  sample_strategy: random

prompt:
  max_source_length: 384
  max_new_tokens: 96

generation:
  do_sample: false
  temperature: 0.0

fine_tuning:
  technique: Prefix Tuning
  base_model: google-t5/t5-small
  dataset: Salesforce/wikisql
  train_split: train
  eval_split: validation
  train_examples: 56355
  eval_examples: 1024
  epochs: 10
  train_limit: null
  selection_metric: eval_loss
  early_stopping_patience: 3
  adapter: Prefix Tuning with 20 virtual tokens and projection enabled
  quantization: None
  eval_metrics_path: outputs/v0.2/t5-small-wikisql-prefix-tuning-early-stopping/eval_metrics.json

reporting:
  preview_limit: 20

output:
  dir: benchmark_results/v0_2/prefix_tuning
  index_path: benchmark_results/v0_2/prefix_tuning/prefix_tuning_wikisql_index.json
