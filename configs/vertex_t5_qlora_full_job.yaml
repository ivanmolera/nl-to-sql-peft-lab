workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-8
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: europe-west1-docker.pkg.dev/nl-sql-peft-lab-ivan-0429/nl-to-sql-peft-lab/train:latest
      env:
        - name: TRAIN_CONFIG
          value: configs/t5_small_wikisql_qlora_full.yaml
        - name: BENCHMARK_CONFIG
          value: configs/t5_small_wikisql_qlora_benchmark.yaml
        - name: GCS_OUTPUT_URI
          value: gs://nl-sql-peft-lab-ivan-0429-training/runs/t5-small-wikisql-qlora-full-train-v0.1.0
