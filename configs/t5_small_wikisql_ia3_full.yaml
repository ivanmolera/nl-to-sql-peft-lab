experiment:
  name: t5-small-wikisql-ia3-full-train
  seed: 42

model:
  name: google-t5/t5-small

dataset:
  name: Salesforce/wikisql
  train_split: train
  eval_split: validation
  train_limit: null
  eval_limit: 256

prompt:
  max_source_length: 384
  max_target_length: 128

ia3:
  target_modules:
    - k
    - v
    - wi
  feedforward_modules:
    - wi

training:
  output_dir: outputs/t5-small-wikisql-ia3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 0.001
  num_train_epochs: 1
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  predict_with_generate: true
  generation_max_length: 128
