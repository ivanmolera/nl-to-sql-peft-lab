experiment:
  name: t5-small-wikisql-prefix-tuning-benchmark
  seed: 42

model:
  id: t5-small-prefix-tuning
  name: google-t5/t5-small
  architecture: seq2seq
  role: T5-small fine-tuned with Prefix Tuning
  adapter_path: outputs/t5-small-wikisql-prefix-tuning/adapter

dataset:
  name: Salesforce/wikisql
  split: validation
  sample_size: 30
  sample_strategy: random

prompt:
  max_source_length: 384
  max_new_tokens: 96

generation:
  do_sample: false
  temperature: 0.0

fine_tuning:
  technique: Prefix Tuning
  base_model: google-t5/t5-small
  dataset: Salesforce/wikisql
  train_split: train
  eval_split: validation
  train_examples: 56355
  eval_examples: 256
  epochs: 1
  train_limit: null
  adapter: Prefix Tuning with 20 virtual tokens and projection enabled
  quantization: None
  eval_metrics_path: outputs/t5-small-wikisql-prefix-tuning/eval_metrics.json

reporting:
  preview_limit: 20

output:
  dir: benchmark_results/prefix_tuning
  index_path: benchmark_results/prefix_tuning/prefix_tuning_wikisql_index.json
