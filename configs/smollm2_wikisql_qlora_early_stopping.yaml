experiment:
  name: smollm2-wikisql-qlora-early-stopping
  seed: 42

model:
  name: HuggingFaceTB/SmolLM2-135M-Instruct

dataset:
  name: Salesforce/wikisql
  train_split: train
  eval_split: validation
  train_limit: null
  eval_limit: 1024

prompt:
  max_source_length: 384
  max_target_length: 128

peft:
  method: qlora

qlora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

training:
  output_dir: outputs/v0.2/smollm2-wikisql-qlora-early-stopping
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_train_epochs: 10
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  gradient_checkpointing: true
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping:
    enabled: true
    patience: 3
    threshold: 0.0
