experiment:
  name: qwen2-5-wikisql-bitfit-early-stopping
  seed: 42

model:
  name: Qwen/Qwen2.5-Coder-0.5B-Instruct

dataset:
  name: Salesforce/wikisql
  train_split: train
  eval_split: validation
  train_limit: null
  eval_limit: 1024

prompt:
  max_source_length: 384
  max_target_length: 128

peft:
  method: bitfit

training:
  output_dir: outputs/v0.2/qwen2-5-wikisql-bitfit-early-stopping
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00005
  num_train_epochs: 10
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  gradient_checkpointing: true
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping:
    enabled: true
    patience: 3
    threshold: 0.0
